<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Snow Cool Solutions - AC, Fridge & Washing Machine Services</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Snow Cool Solutions - Expert AC, Refrigerator & Washing Machine repair and service. Book online now for fast, reliable home appliance service."
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .error-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 60px 40px;
        text-align: center;
      }

      .error-icon {
        font-size: 80px;
        color: #e74c3c;
        margin-bottom: 30px;
      }

      .error-title {
        font-size: 32px;
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 15px;
        line-height: 1.4;
      }

      .error-message {
        font-size: 16px;
        color: #555;
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .error-actions {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 30px;
        margin-bottom: 30px;
        text-align: left;
      }

      .error-actions h3 {
        font-size: 18px;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 20px;
        text-align: center;
      }

      .error-actions ul {
        list-style: none;
      }

      .error-actions li {
        font-size: 15px;
        color: #555;
        margin-bottom: 15px;
        padding-left: 30px;
        position: relative;
        line-height: 1.5;
      }

      .error-actions li:last-child {
        margin-bottom: 0;
      }

      .error-actions li::before {
        content: '✓';
        position: absolute;
        left: 0;
        color: #27ae60;
        font-weight: bold;
        font-size: 18px;
      }

      .error-code {
        background: #2c3e50;
        color: white;
        padding: 20px;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 2px;
      }

      .error-code span {
        display: block;
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 8px;
      }

      @media (max-width: 600px) {
        .error-container {
          padding: 40px 25px;
        }

        .error-title {
          font-size: 24px;
        }

        .error-icon {
          font-size: 60px;
        }

        .error-actions {
          padding: 20px;
        }

        .error-actions h3 {
          font-size: 16px;
        }

        .error-actions li {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-icon">
        <i class="fas fa-exclamation-circle"></i>
      </div>
      <h1 class="error-title">Error — Service Unavailable</h1>
      <p class="error-message">Something went wrong on our end.</p>
      
      <div class="error-actions">
        <h3>Please try the following:</h3>
        <ul>
          <li>Restart the server</li>
          <li>Contact your administrator if the issue persists</li>
          <li>Reference Error Code : 500</li>
        </ul>
      </div>

      <div class="error-code">
        <span>Error Code</span>
        500
      </div>
    </div>
  </body>
</html>
